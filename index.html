<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一句</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f7f3ed;
    color: #2c2c2c;
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", Georgia, "Times New Roman", serif;
    line-height: 1.8;
    padding: 2rem;
  }

  .card {
    max-width: 640px;
    width: 100%;
    text-align: center;
  }

  .date {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 0.85rem;
    color: #b0a89b;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .quote {
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    line-height: 1.85;
    letter-spacing: 0.02em;
    margin-bottom: 1.5rem;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }

  .source {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 0.95rem;
    color: #9a9184;
  }

  .source::before {
    content: "—— ";
  }

  .btn-group {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid #d5cfc5;
    background: rgba(247, 243, 237, 0.9);
    color: #b0a89b;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.25;
    transition: opacity 0.25s, color 0.25s, border-color 0.25s, transform 0.15s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .icon-btn:hover,
  .icon-btn:focus-visible {
    opacity: 1;
    color: #6b6358;
    border-color: #b0a89b;
    outline: none;
  }

  .icon-btn:active {
    transform: scale(0.95);
  }

  .icon-btn svg {
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  .icon-btn.copied {
    opacity: 1;
    color: #5a8a6e;
    border-color: #5a8a6e;
  }

  .quote.fade-out {
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .quote.fade-in {
    opacity: 1;
    transition: opacity 0.25s ease;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(180deg); }
  }

  .icon-btn.spinning svg {
    animation: spin 0.35s ease;
  }

  .version {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 0.7rem;
    color: #d0c8b8;
    margin-top: 3rem;
  }

  @media (max-width: 480px) {
    body { padding: 1.5rem; }
    .btn-group { bottom: 1.25rem; right: 1.25rem; }
    .icon-btn { opacity: 0.35; }
    .quote { font-size: clamp(1.15rem, 5vw, 1.5rem); }
  }
</style>
</head>
<body>

<main class="card">
  <div class="date" id="date"></div>
  <blockquote class="quote" id="quote"></blockquote>
  <cite class="source" id="source"></cite>
  <div class="version">每日一句 v1.0</div>
</main>

<div class="btn-group">
  <button class="icon-btn" id="refreshBtn" aria-label="换一句" title="换一句">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
  </button>
  <button class="icon-btn" id="copyBtn" aria-label="复制名言" title="复制">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
  </button>
</div>

<noscript>
  <style>
    .card { opacity: 1; }
  </style>
  <div class="card" style="text-align:center">
    <p style="color:#b0a89b">请启用 JavaScript 以显示每日名言。</p>
  </div>
</noscript>

  function hashDJB2(str) {
    var h = 5381;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) + h + str.charCodeAt(i)) | 0;
    }
    return h >>> 0;
  }

  function getTodayKey() {
    var d = new Date();
    var yyyy = d.getFullYear();
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    return yyyy + '-' + mm + '-' + dd;
  }

  function getDateDisplay() {
    var d = new Date();
    var weekdays = ['日', '一', '二', '三', '四', '五', '六'];

      + (d.getMonth() + 1) + '月'
      + d.getDate() + '日'
      + '　星期' + weekdays[d.getDay()];
  }

      void quoteEl.offsetWidth;
      quoteEl.classList.add('fade-in');
      setTimeout(function () { quoteEl.classList.remove('fade-in'); }, 250);
    });
    currentIdx = idx;
  }

  var key = getTodayKey();
  var dailyIdx = hashDJB2(key) % QUOTES.length;

  document.getElementById('date').textContent = getDateDisplay();
  quoteEl.textContent = QUOTES[dailyIdx].t;
  sourceEl.textContent = QUOTES[dailyIdx].s;
  currentIdx = dailyIdx;

  var copyBtn = document.getElementById('copyBtn');
  var copyTimer = null;

  function getCopyText() {
    return quoteEl.textContent + ' ——' + sourceEl.textContent;
  }

  copyBtn.addEventListener('click', function () {
    var text = getCopyText();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(showCopied);
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showCopied(); } catch (e) {}
      document.body.removeChild(ta);
    }
  });

  function showCopied() {
    copyBtn.classList.add('copied');
    copyBtn.setAttribute('title', '已复制');
    clearTimeout(copyTimer);
    copyTimer = setTimeout(function () {
      copyBtn.classList.remove('copied');
      copyBtn.setAttribute('title', '复制');
    }, 1600);
  }

  var refreshBtn = document.getElementById('refreshBtn');
  refreshBtn.addEventListener('click', function () {
    refreshBtn.classList.add('spinning');
    setTimeout(function () { refreshBtn.classList.remove('spinning'); }, 350);

    var newIdx;
    do {
      newIdx = Math.floor(Math.random() * QUOTES.length);
    } while (newIdx === currentIdx && QUOTES.length > 1);

    setQuote(newIdx);
  });
})();
</script>

</body>
</html>
